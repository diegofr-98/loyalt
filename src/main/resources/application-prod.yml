spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 3
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}

supabase:
  url: ${SUPABASE_URL}
  publishable-key: ${SUPABASE_PUBLISHABLE_KEY}

google:
  wallet:
    issuer-id: ${GOOGLE_WALLET_ISSUER_ID}
    qr-base-url: ${QR_BASE_URL}

webhook:
  secret: ${WEBHOOK_SECRET}





