spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 5
      minimum-idle: 0
      idle-timeout: 10000
      max-lifetime: 30000
      idle-timeout=10000: 10000
      connection-timeout: 10000
      validation-timeout: 5000
      keepalive-time: 0
      auto-commit: true

  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        temp:
          use_jdbc_metadata_defaults: false

server:
  port: ${PORT:8080}

supabase:
  url: ${SUPABASE_URL}
  publishable-key: ${SUPABASE_PUBLISHABLE_KEY}

google:
  wallet:
    issuer-id: ${GOOGLE_WALLET_ISSUER_ID}
    qr-base-url: ${QR_BASE_URL}
    qr-base-url-path: ${QR_BASE_URL_PATH}
    qr-base-url-query-param: ${QR_BASE_URL_QUERY_PARAM}

webhook:
  secret: ${WEBHOOK_SECRET}





